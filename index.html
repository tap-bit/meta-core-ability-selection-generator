<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Core: Power Registry Architect</title>
    <style>
        :root { --cyan: #00d4ff; --bg: #0a0a0a; --card: #141414; --border: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #e0e0e0; padding: 20px; font-size: 14px; }
        .container { max-width: 1000px; margin: 0 auto; background: #111; padding: 25px; border-radius: 12px; border: 1px solid var(--cyan); box-shadow: 0 0 30px rgba(0, 212, 255, 0.1); }
        h1 { color: var(--cyan); text-align: center; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px; }
        .section { background: var(--card); padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border); }
        h2 { font-size: 1rem; color: var(--cyan); text-transform: uppercase; margin: 0 0 15px 0; border-bottom: 1px solid #333; padding-bottom: 8px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 8px; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 4px; box-sizing: border-box; outline: none; transition: 0.2s; }
        input[type="text"]:focus, input[type="number"]:focus, select:focus { border-color: var(--cyan); }
        
        /* New Ability Grid Styling */
        .ability-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .ability-grid::-webkit-scrollbar { width: 6px; }
        .ability-grid::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        .ability-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 12px; display: flex; flex-direction: column; gap: 10px; transition: 0.2s; }
        .ability-card:hover { border-color: #555; background: #1e1e1e; }
        .ability-card.active { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0, 212, 255, 0.05); }
        .ability-header { display: flex; align-items: center; gap: 10px; font-weight: bold; cursor: pointer; }
        .ability-header input { width: 16px; height: 16px; accent-color: var(--cyan); cursor: pointer; }
        .ability-controls { display: flex; gap: 10px; margin-left: 26px; }
        
        /* Aura Grid Styling */
        .aura-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .aura-card { background: #1a1a1a; padding: 10px 15px; border-radius: 6px; border: 1px solid #2a2a2a; display: flex; align-items: center; justify-content: space-between; }
        .aura-indicator { width: 12px; height: 12px; border-radius: 50%; display: inline-block; border: 1px solid #444; }
        
        .dynamic-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
        .btn-add { background: transparent; color: var(--cyan); border: 1px dashed var(--cyan); padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; transition: 0.2s; }
        .btn-add:hover { background: rgba(0, 212, 255, 0.1); }
        .btn-del { background: #ff4d4d22; color: #ff4d4d; border: 1px solid #ff4d4d; padding: 6px 10px; border-radius: 4px; cursor: pointer; }
        
        .btn-generate { width: 100%; padding: 15px; background: var(--cyan); color: #000; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
        .btn-generate:hover { box-shadow: 0 0 15px var(--cyan); }
        
        #output-container { margin-top: 20px; position: relative; }
        #output { width: 100%; height: 350px; background: #050505; color: #00ff88; font-family: 'Consolas', monospace; padding: 15px; border-radius: 8px; border: 1px solid #333; overflow-y: auto; white-space: pre; font-size: 0.85rem; }
        .copy-btn { position: absolute; top: 10px; right: 25px; background: #222; color: #fff; border: 1px solid #444; padding: 6px 12px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .copy-btn:hover { background: #333; color: var(--cyan); border-color: var(--cyan); }
    </style>
</head>
<body>

<div class="container">
    <h1>Power Registry Architect</h1>

    <div class="grid">
        <div class="section">
            <h2>1. Identity</h2>
            <div class="grid">
                <div><label>Registry Key</label><input type="text" id="suitId" value="hero_key"></div>
                <div><label>Suit Item</label><input type="text" id="suitItem" value="suit:hero_suit"></div>
                <div><label>Master Tag</label><input type="text" id="masterTag" value="has_hero_powers"></div>
                <div><label>DNA Tag</label><input type="text" id="dnaTag" value="dna:hero"></div>
            </div>
            <label style="margin-top:15px; display:flex; align-items:center; gap:8px; color:#ccc; font-size: 0.8rem; cursor: pointer;">
                <input type="checkbox" id="useInjections" onchange="document.getElementById('injBox').style.display = this.checked ? 'grid':'none'" style="width:auto; accent-color:var(--cyan);"> 
                Enable DNA Injections
            </label>
            <div id="injBox" class="grid" style="display:none; margin-top:10px; background: #161616; padding: 10px; border-radius: 6px;">
                <div><label>Injection</label><input type="text" id="injItem" value="injection:hero"></div>
                <div><label>Empty</label><input type="text" id="emptyItem" value="injection:empty"></div>
            </div>
        </div>

        <div class="section">
            <h2>2. Effects & Tags</h2>
            <div id="effectContainer"></div>
            <button class="btn-add" onclick="addEffectRow()">+ Add Potion Effect</button>
            <div style="margin-top:20px;">
                <label>Manual Power Tags (comma separated)</label>
                <input type="text" id="customTags" placeholder="sound:step, immune:fire">
            </div>
        </div>
    </div>

    <div class="section">
        <h2>3. Item & Ability Selection</h2>
        <div class="ability-grid" id="abilitiesContainer"></div>
    </div>

    <div class="section">
        <h2>4. Lightning Aura Mapping</h2>
        <p style="font-size: 0.8rem; color: #888; margin-top: -5px; margin-bottom: 15px;">Enter the number the player will input to trigger each aura color. Leave blank to omit.</p>
        <div class="aura-grid" id="auraContainer"></div>
    </div>

    <button class="btn-generate" onclick="generateRegistry()">Generate Registry</button>

    <div id="output-container">
        <button class="copy-btn" onclick="const t=document.getElementById('output').textContent; navigator.clipboard.writeText(t); this.innerText='COPIED!'; setTimeout(()=>this.innerText='COPY', 2000);">COPY</button>
        <div id="output">// Registry JSON will appear here...</div>
    </div>
</div>

<script>
    const colors = ["red", "blue", "yellow", "orange", "green", "purple", "pink", "white", "black", "cyan"];
    const auraColors = ["Red", "Blue", "Yellow", "Orange", "Green", "Purple", "Pink", "White", "Black"];
    
    // Hex mappings just for the UI visual indicators
    const hexMap = { Red: "#ff4444", Blue: "#4444ff", Yellow: "#ffff44", Orange: "#ffaa00", Green: "#44ff44", Purple: "#aa44ff", Pink: "#ff88ff", White: "#ffffff", Black: "#333333" };

    const abilityDb = [
        { name: "Area Teleport", id: "ability:area_teleport", type: "item_tag", color: true, icon: "portal" },
        { name: "Chest Energy Beam", id: "ability:chest_energy_beam_<color>", type: "item_only", color: true, icon: "chest_energy_beam" },
        { name: "Double Energy Beam", id: "ability:double_energy_beam_<color>", type: "item_only", color: true, icon: "double_energy_beam" },
        { name: "Energy Beam", id: "ability:energy_beam_<color>", type: "item_only", color: true, icon: "energy_beam" },
        { name: "Energy Bomb", id: "ability:energy_bomb", type: "item_tag", scale: true, color: true, icon: "energy_bomb" },
        { name: "Extra Life", id: "ability:extra_life", type: "tag_only", scale: true },
        { name: "Fire Breath", id: "ability:fire_breath", type: "item_tag", scale: true, icon: "fire_breath" },
        { name: "Flight", id: "ability:flight", type: "item_tag", scale: true, icon: "flight" },
        { name: "Forcefield", id: "ability:forcefield_<color>", type: "item_only", color: true, icon: "forcefield" },
        { name: "Frostbite Wave", id: "ability:frostbite_wave", type: "item_only", icon: "frostbite_wave" },
        { name: "Gravity Flip", id: "ability:gravity_flip", type: "item_only", icon: "gravity_flip" },
        { name: "Ground Smash", id: "ability:ground_smash", type: "item_tag", scale: true, icon: "ground_smash" },
        { name: "Head Energy Beam", id: "ability:head_energy_beam_<color>", type: "item_only", color: true, icon: "head_energy_beam" },
        { name: "Healing Aura", id: "ability:healing_aura", type: "item_only", icon: "healing_aura" },
        { name: "Heat Vision", id: "ability:heat_vision", type: "item_tag", scale: true, color: true, icon: "heat_vision" },
        { name: "Ice Breath", id: "ability:ice_breath", type: "item_tag", scale: true, icon: "ice_breath" },
        { name: "Kinetic Pulse", id: "ability:kinetic_pulse", type: "item_only", icon: "kinetic_pulse" },
        { name: "Lightning Beam", id: "ability:lightning_beam_<color>", type: "item_only", color: true, icon: "lightning_beam" },
        { name: "Lightning Strike", id: "ability:lightning_strike", type: "item_only", icon: "lightning_strike" },
        { name: "Phase", id: "ability:phase", type: "item_only", icon: "phase" },
        { name: "Photo Healing", id: "ability:photo_healing", type: "tag_only" },
        { name: "Power Blast", id: "ability:power_blast", type: "item_tag", scale: true, color: true, icon: "power_blast" },
        { name: "Prism Shot", id: "ability:prism_shot", type: "item_tag", scale: true, color: true, icon: "prism_shot" },
        { name: "Rocket Slam", id: "ability:rocket_slam", type: "item_tag", scale: true, icon: "rocket_slam" },
        { name: "Super Speed", id: "ability:super_speed", type: "item_tag", scale: true, color: true, icon: "super_speed" },
        { name: "Super Strength", id: "ability:super_strength", type: "tag_only", scale: true },
        { name: "Telekinesis", id: "ability:telekinesis", type: "item_only", icon: "telekinesis" },
        { name: "Thunderclap", id: "ability:thunderclap", type: "item_tag", scale: true, icon: "thunderclap" },
        { name: "Undying", id: "ability:undying", type: "tag_only" },
        { name: "Mask Off", id: "animation.suit.mask_off", type: "item_only", icon: "mask_off", rawId: "ability:mask_off" },
        { name: "Hood Down", id: "animation.suit.hood_down", type: "item_only", icon: "hood_down", rawId: "ability:hood_down" },
        { name: "Suit Off", id: "animation.suit.suit_off", type: "item_only", icon: "suit_off", rawId: "ability:suit_off" },
        { name: "Nano Toggle", id: "ability:toggle_anim_suit", type: "item_only", icon: "toggle_anim_suit" }
    ];

    function initAbilities() {
        const container = document.getElementById('abilitiesContainer');
        abilityDb.forEach((ab, i) => {
            container.innerHTML += `
                <div class="ability-card" id="card_${i}">
                    <label class="ability-header">
                        <input type="checkbox" id="ab_check_${i}" onchange="document.getElementById('card_${i}').classList.toggle('active', this.checked)">
                        <span>${ab.name}</span>
                    </label>
                    ${ab.scale || ab.color ? `
                    <div class="ability-controls">
                        ${ab.scale ? `<input type="number" id="ab_lv_${i}" placeholder="Scale" value="100" style="width: 40%;">`:''}
                        ${ab.color ? `
                        <select id="ab_col_${i}" style="width: 60%;">
                            <option value="" disabled selected>Select Color</option>
                            ${colors.map(c=>`<option value="${c}">${c.charAt(0).toUpperCase() + c.slice(1)}</option>`).join('')}
                        </select>`:''}
                    </div>` : ''}
                </div>`;
        });
    }

    function initAuras() {
        const container = document.getElementById('auraContainer');
        auraColors.forEach(color => {
            container.innerHTML += `
                <div class="aura-card">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span class="aura-indicator" style="background-color: ${hexMap[color]}"></span>
                        <span style="font-weight: bold;">${color}</span>
                    </div>
                    <input type="number" id="aura_val_${color}" placeholder="Aura #" min="1" max="99" style="width: 70px; text-align: center;">
                </div>
            `;
        });
    }

    function addEffectRow() {
        const div = document.createElement('div');
        div.className = 'dynamic-row';
        div.innerHTML = `<input type="text" placeholder="minecraft:effect_id" class="eff-id" style="flex:2;"> <input type="number" value="1" placeholder="Lvl" class="eff-lv" style="flex:1;"> <button class="btn-del" onclick="this.parentElement.remove()">X</button>`;
        document.getElementById('effectContainer').appendChild(div);
    }

    function generateRegistry() {
        const suitId = document.getElementById('suitId').value;
        const res = {
            suitItem: document.getElementById('suitItem').value,
            tag: document.getElementById('masterTag').value,
            dnaTag: document.getElementById('dnaTag').value,
            powerTags: [],
            effects: [],
            abilities: [],
            auras: []
        };

        if(document.getElementById('useInjections').checked) {
            res.injectionItem = document.getElementById('injItem').value;
            res.emptyItem = document.getElementById('emptyItem').value;
        }

        // Effects
        document.querySelectorAll('#effectContainer .dynamic-row').forEach(row => {
            const id = row.querySelector('.eff-id').value;
            if(id) res.effects.push({ id: id, level: parseInt(row.querySelector('.eff-lv').value) });
        });

        // Abilities
        abilityDb.forEach((ab, i) => {
            if(!document.getElementById(`ab_check_${i}`).checked) return;
            
            const scaleEl = document.getElementById(`ab_lv_${i}`);
            const colEl = document.getElementById(`ab_col_${i}`);
            
            const lv = scaleEl ? scaleEl.value : null;
            const col = colEl ? colEl.value : null;

            if(ab.type !== 'tag_only') {
                res.abilities.push({ 
                    name: ab.name, 
                    itemId: ab.id.replace('<color>', col || 'red'), 
                    icon: `textures/items/abilities/${ab.icon}` 
                });
            }
            if(lv) res.powerTags.push(`${ab.id.split(':')[1].replace('_<color>', '')}_${lv}`);
            if(col && ab.type === 'item_tag') res.powerTags.push(`${ab.id.split(':')[1]}_${col}`);
        });

        // Custom Tags
        const custom = document.getElementById('customTags').value;
        if(custom) custom.split(',').forEach(t => { if(t.trim()) res.powerTags.push(t.trim()) });

        // Fixed Auras Mapping
        auraColors.forEach(color => {
            const valInput = document.getElementById(`aura_val_${color}`).value;
            if (valInput && valInput.trim() !== "") {
                const colLower = color.toLowerCase();
                res.auras.push({
                    name: `${color} Lightning Aura`,
                    value: parseInt(valInput),
                    icon: `textures/entity/lightning/lightning_${colLower}`
                });
            }
        });

        // Stringify and Flatten specific objects to one line
        let json = JSON.stringify(res, null, 4);
        json = json.replace(/\{\s+"name": "(.*?)",\s+"itemId": "(.*?)",\s+"icon": "(.*?)"\s+\}/g, '{ name: "$1", itemId: "$2", icon: "$3" }');
        json = json.replace(/\{\s+"name": "(.*?)",\s+"value": (\d+),\s+"icon": "(.*?)"\s+\}/g, '{ name: "$1", value: $2, icon: "$3" }');
        json = json.replace(/\{\s+"id": "(.*?)",\s+"level": (\d+)\s+\}/g, '{ id: "$1", level: $2 }');

        document.getElementById('output').textContent = `"${suitId}": ${json},`;
    }

    addEffectRow();
    initAbilities();
    initAuras();
</script>
</body>
</html>
